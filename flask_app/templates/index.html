<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAYSON | Live Vision</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 🎨 Color Variables */
        :root {
            /* Light Mode */
            --bg-color: #f3f4f6;
            --surface-color: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --accent: #3b82f6;
            --danger-color: #ef4444;
        }

        [data-theme="dark"] {
            /* Dark Mode */
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --accent: #38bdf8;
            --danger-color: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 🎛️ Theme Toggle Button */
        .theme-switch-wrapper {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            align-items: center;
        }

        .theme-btn {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow);
        }
        .theme-btn:hover {
            transform: scale(1.05);
        }

        /* 🪟 Main Container (Centered & Compact) */
        .dashboard {
            width: 100%;
            max-width: 900px; 
            background: var(--surface-color);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* ✨ Header */
        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 300;
        }

        /* 🎬 Content Layout (Video Focused) */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* 📷 Video Section */
        .video-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid var(--border-color);
            background: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        .video-container img {
            width: 100%;
            display: block;
            opacity: 0.95;
        }

        .live-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--danger-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="theme-switch-wrapper">
        <button class="theme-btn" id="theme-toggle" title="Toggle Dark/Light Mode">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>
    </div>

    <div class="dashboard">
        
        <div class="header">
            <h1><i class="fa-solid fa-shield-halved" style="color: var(--accent);"></i> GRAYSON</h1>
            <p>Intelligent Face Mask Monitoring Core</p>
        </div>

        <div class="main-content">
            
            <div class="video-container">
                <div class="live-badge">
                    <div class="live-dot"></div> LIVE
                </div>
                <img src="{{ url_for('video') }}" alt="Camera Initializing...">
            </div>

        </div>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        
        themeToggleBtn.addEventListener('click', () => {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.setAttribute('data-theme', 'dark');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });
    </script>

</body>
</html>
